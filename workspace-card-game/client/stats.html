<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2v2 棋牌游戏 - 战绩统计</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .stats-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .controls {
      text-align: center;
      margin-bottom: 20px;
    }
    
    button {
      padding: 12px 30px;
      font-size: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 0 10px;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f8f9fa;
      color: #333;
      font-weight: bold;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .rank {
      font-weight: bold;
      color: #667eea;
    }
    
    .rank-1 { color: #FFD700; }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }
    
    .win { color: #4CAF50; font-weight: bold; }
    .loss { color: #f44336; }
    
    .win-rate {
      font-weight: bold;
      color: #2196F3;
    }
    
    .empty-state {
      text-align: center;
      padding: 50px;
      color: #999;
    }
    
    .emoji {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    @media (max-width: 768px) {
      body {
        min-height: 100dvh;
        padding: 10px;
      }

      .stats-container {
        padding: 16px 12px;
        border-radius: 14px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 16px;
      }

      .controls {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        margin: 0;
        padding: 10px 8px;
        font-size: 14px;
      }

      th, td {
        padding: 10px 8px;
        font-size: 13px;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="stats-container">
      <h1>📊 战绩统计</h1>
      
      <div class="controls">
        <button @click="fetchStats">🔄 刷新</button>
        <button @click="backToLobby">← 返回大厅</button>
      </div>
      
      <div class="table-wrap" v-if="stats.length > 0">
        <table>
          <thead>
            <tr>
              <th>排名</th>
              <th>玩家</th>
              <th>总场次</th>
              <th>胜场</th>
              <th>负场</th>
              <th>胜率</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(s, index) in sortedStats" :key="s.id">
              <td class="rank" :class="'rank-' + (index + 1)">
                {{ getRankIcon(index + 1) }}
              </td>
              <td>{{ s.nickname }}</td>
              <td>{{ s.total_games }}</td>
              <td class="win">{{ s.wins }}</td>
              <td class="loss">{{ s.losses }}</td>
              <td class="win-rate">{{ s.win_rate }}%</td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div class="empty-state" v-else>
        <div class="emoji">🎮</div>
        <p>暂无数据</p>
        <p>先玩几局再来查看战绩吧！</p>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;
    
    createApp({
      data() {
        return {
          stats: [],
          ws: null
        };
      },
      computed: {
        sortedStats() {
          return [...this.stats].sort((a, b) => {
            if (b.wins !== a.wins) return b.wins - a.wins;
            return b.win_rate - a.win_rate;
          });
        }
      },
      mounted() {
        this.fetchStats();
      },
      methods: {
        getWebSocketUrl() {
          const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
          const host = window.location.hostname || 'localhost';
          return `${protocol}://${host}:3235`;
        },

        fetchStats() {
          if (this.ws) {
            this.ws.close();
          }
          
          this.ws = new WebSocket(this.getWebSocketUrl());
          
          this.ws.onopen = () => {
            console.log('已连接');
            this.ws.send(JSON.stringify({ action: 'getStats' }));
          };
          
          this.ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'allStats') {
              this.stats = msg.stats;
            }
          };
          
          this.ws.onclose = () => {
            console.log('连接已断开');
          };
        },
        
        getRankIcon(rank) {
          const icons = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
          return icons[rank - 1] || rank;
        },
        
        backToLobby() {
          window.location.href = 'index.html';
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
